services:
  # 关系型数据库：存放chunk内容和sql表
  postgres:
    image: postgres:15-alpine
    container_name: kag_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=${POSTGRES_DB:-kag_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kag_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  # 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: kag_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
  
  # 图数据库
  neo4j:
    image: neo4j:5.16.0-community
    container_name: kag_neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      - NEO4J_PLUGINS='["apoc"]'
      - NEO4J_apoc_export_file_enabled="true"
      - NEO4J_apoc_import_file_enabled="true"
      - NEO4J_apoc_import_use__neo4j__config="true"
    ports:
      - "7474:7474" # browser ui
      - "7687:7687" # bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-password123}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins: